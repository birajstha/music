name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate PWA icons
        run: node scripts/make-icons.mjs

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: b76a05388b01b4e59515ffccb0c2fa58
          projectName: music
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: '3'

      - name: Set YOUTUBE_API_KEY as Pages environment variable
        run: |
          curl -s -X PATCH "https://api.cloudflare.com/client/v4/accounts/b76a05388b01b4e59515ffccb0c2fa58/pages/projects/music" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{
              "deployment_configs": {
                "production": {
                  "env_vars": {
                    "YOUTUBE_API_KEY": { "type": "secret_text", "value": "${{ secrets.YOUTUBE_API_KEY }}" }
                  }
                }
              }
            }'
